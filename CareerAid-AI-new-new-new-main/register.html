<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>注册 - CareerAid AI</title>
    <link rel="stylesheet" href="static/style.css" />
  </head>
  <body>
    <div class="login-layout">
      <div class="login-card">
        <div class="login-logo">
          <!-- 简约线条插画 -->
          <svg width="80" height="80" viewBox="0 0 80 80" class="illustration" style="margin-bottom:16px;opacity: 0.9;">
            <!-- 外框 -->
            <rect x="10" y="10" width="60" height="60" stroke="var(--primary)" stroke-width="3" fill="var(--primary-light)"/>
            <!-- 职业阶梯 -->
            <polyline points="20,55 30,55 30,45 40,45 40,35 50,35 50,25 60,25" 
                      stroke="#000" stroke-width="2" fill="none"/>
            <!-- 节点 -->
            <circle cx="20" cy="55" r="4" stroke="#000" stroke-width="2" fill="#fff"/>
            <circle cx="30" cy="45" r="4" stroke="#000" stroke-width="2" fill="#fff"/>
            <circle cx="40" cy="35" r="4" stroke="#000" stroke-width="2" fill="#fff"/>
            <circle cx="50" cy="25" r="4" stroke="#000" stroke-width="2" fill="var(--primary)"/>
            <!-- AI 星星 -->
            <polygon points="60,25 61,28 64,28 62,30 63,33 60,31 57,33 58,30 56,28 59,28" 
                     fill="var(--primary)" stroke="#000" stroke-width="1"/>
          </svg>
          <h1>CareerAid AI</h1>
          <p>大学生职业规划智能体</p>
        </div>
        
        <form id="registerForm">
          <div class="form-group">
            <label>用户名</label>
            <input id="username" placeholder="请输入用户名" autocomplete="username" required />
          </div>
          
          <div class="form-group">
            <label>密码</label>
            <input id="password" type="password" placeholder="请输入密码（至少6位）" autocomplete="new-password" required />
          </div>
          
          <div class="form-group">
            <label>确认密码</label>
            <input id="confirmPassword" type="password" placeholder="请再次输入密码" autocomplete="new-password" required />
          </div>
          
          <div class="form-group">
            <label>昵称（可选）</label>
            <input id="name" placeholder="请输入昵称" autocomplete="name" />
          </div>
          
          <button class="btn btn-primary btn-lg" type="submit" style="width:100%;margin-top:8px">
            注册
          </button>
          
          <div class="form-hint" style="text-align:center;margin-top:16px">
            已有账号？<a href="login.html">立即登录</a>
          </div>
          
          <div id="msg" class="form-hint" style="color:#dc2626;text-align:center;margin-top:12px"></div>
        </form>
        
      </div>
    </div>

    <script src="static/app.js"></script>
    <script>
      const msg = CareerAid.qs("msg");
      const username = CareerAid.qs("username");
      const password = CareerAid.qs("password");
      const confirmPassword = CareerAid.qs("confirmPassword");
      const name = CareerAid.qs("name");

      CareerAid.qs("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.textContent = "";
        
        // 验证密码
        if (password.value !== confirmPassword.value) {
          msg.textContent = "两次输入的密码不一致";
          return;
        }
        
        try {
          const data = await CareerAid.apiFetch("/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
              username: username.value.trim(), 
              password: password.value.trim(),
              name: name.value.trim() 
            }),
          });
          
          // 注册成功，跳转到登录页
          alert("注册成功，请登录");
          window.location.href = "login.html";
        } catch (err) {
          msg.textContent = err.message || String(err);
        }
      });
    </script>
  </body>
</html>
