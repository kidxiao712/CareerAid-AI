<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>提升规划 - CareerAid AI</title>
    <link rel="stylesheet" href="static/style.css" />
  </head>
  <body>
    <div class="app-layout">
      <!-- 侧边栏 -->
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="logo">CareerAid AI</div>
          <div class="tagline">大学生职业规划智能体</div>
        </div>
        
        <nav class="sidebar-nav">
          <div class="nav-section">
            <div class="nav-section-title">核心功能</div>
            <a class="nav-item" href="upload.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
              简历解析
            </a>
            <a class="nav-item" href="test.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              性格测评
            </a>
            <a class="nav-item" href="match.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              人岗匹配
            </a>
            <a class="nav-item" href="report.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              报告生成
            </a>
          </div>
          
          <div class="nav-section">
            <div class="nav-section-title">更多</div>
            <a class="nav-item" href="chat.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
              AI对话
            </a>
            <a class="nav-item active" href="job.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              提升规划
            </a>
            <a class="nav-item" href="admin.html" id="adminLink" style="display: none;">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              管理员后台
            </a>
          </div>
        </nav>
        
        <div class="sidebar-footer">
          <div class="user-info" id="userInfo">
            <div class="user-avatar">U</div>
            <div class="user-meta">
              <div class="user-name" id="userName">用户</div>
              <div class="user-role">学生</div>
            </div>
          </div>
          <button class="btn btn-danger" style="width:100%;margin-top:12px" id="logoutBtn">退出登录</button>
        </div>
      </aside>

      <!-- 主内容区 -->
      <main class="main-content">
        <header class="topbar">
          <button class="menu-toggle" id="menuToggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="topbar-title">提升规划</h1>
          <div class="topbar-actions">
            <span class="badge badge-secondary">支持筛选</span>
          </div>
        </header>

        <div class="page-content">
          <!-- 垂直布局 -->
          <div class="vertical-layout">
            <!-- 上方：筛选 -->
            <div class="card card-featured">
              <div class="card-header">
                <div>
                  <h2 class="card-title">筛选</h2>
                  <p class="card-subtitle">关键词搜索岗位</p>
                </div>
                <!-- 简约线条插画 -->
                <svg width="60" height="60" viewBox="0 0 60 60" class="illustration" style="opacity: 0.9;">
                  <circle cx="25" cy="25" r="15" stroke="var(--primary)" stroke-width="2" fill="none"/>
                  <line x1="35" y1="35" x2="50" y2="50" stroke="#000" stroke-width="3"/>
                  <line x1="32" y1="38" x2="38" y2="32" stroke="#000" stroke-width="2"/>
                </svg>
              </div>
              
              <div class="form-group">
                <label>关键词（岗位/行业/要求）</label>
                <input id="q" placeholder="例如：后端 / 数据 / NLP / React" />
              </div>
              
              <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">
                <button class="btn btn-primary" id="search">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                  搜索
                </button>
                <button class="btn" id="reset">重置</button>
              </div>
              
              <div class="form-hint" id="msg"></div>
            </div>



            <!-- 下方：岗位列表 -->
            <div class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title">提升规划</h2>
                  <p class="card-subtitle">查看岗位并制定提升计划</p>
                </div>
              </div>
              
              <div class="form-hint">登录且已解析简历时，列表会显示匹配预览；点击"查看匹配详情"进入 TOP5 与雷达图。</div>
              <div class="hr"></div>
              
              <!-- 空状态 -->
              <div id="emptyState" style="text-align:center;padding:60px 20px">
                <svg width="140" height="120" viewBox="0 0 140 120" class="illustration" style="margin-bottom:16px;opacity: 0.9;">
                  <!-- 建筑/公司 -->
                  <rect x="30" y="40" width="30" height="60" stroke="var(--primary)" stroke-width="2" fill="var(--primary-light)"/>
                  <rect x="70" y="60" width="40" height="40" stroke="var(--primary)" stroke-width="2" fill="var(--primary-light)"/>
                  <!-- 窗户 -->
                  <rect x="38" y="50" width="6" height="6" stroke="#000" stroke-width="1" fill="#fff"/>
                  <rect x="48" y="50" width="6" height="6" stroke="#000" stroke-width="1" fill="#fff"/>
                  <rect x="38" y="62" width="6" height="6" stroke="#000" stroke-width="1" fill="#fff"/>
                  <rect x="48" y="62" width="6" height="6" stroke="#000" stroke-width="1" fill="#fff"/>
                  <rect x="38" y="74" width="6" height="6" stroke="#000" stroke-width="1" fill="#fff"/>
                  <rect x="48" y="74" width="6" height="6" stroke="#000" stroke-width="1" fill="#fff"/>
                  <!-- 门 -->
                  <rect x="80" y="85" width="8" height="15" stroke="#000" stroke-width="1" fill="#fff"/>
                  <!-- 地面 -->
                  <line x1="20" y1="100" x2="120" y2="100" stroke="#000" stroke-width="2"/>
                </svg>
                <div style="color:var(--text-muted);font-size:14px">点击搜索查看岗位列表</div>
              </div>
              
              <div class="list" id="list"></div>
              
              <!-- 查看更多按钮 -->
              <div id="loadMore" style="text-align:center;padding:20px;display:none">
                <button class="btn btn-primary" id="loadMoreBtn">查看更多</button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="static/app.js"></script>
    <script>
      // 加载用户信息
      const token = CareerAid.getToken();
      if (token) {
        CareerAid.apiFetch('/me').then(data => {
          const s = data.student || {};
          document.getElementById('userName').textContent = s.username || '用户';
          document.querySelector('.user-avatar').textContent = (s.username || 'U')[0].toUpperCase();
          
          // 显示管理员后台链接
          if (s.username === 'admin') {
            document.getElementById('adminLink').style.display = 'block';
          }
        }).catch(() => {});
      } else {
        document.getElementById('userInfo').style.display = 'none';
        document.getElementById('logoutBtn').textContent = '去登录';
        document.getElementById('logoutBtn').className = 'btn btn-primary';
        document.getElementById('logoutBtn').addEventListener('click', () => {
          window.location.href = 'login.html';
        });
      }
      
      // 退出登录
      document.getElementById('logoutBtn').addEventListener('click', () => {
        if (token) {
          CareerAid.clearToken();
          window.location.href = 'index.html';
        }
      });
      
      // 移动端菜单
      document.getElementById('menuToggle').addEventListener('click', () => {
        document.querySelector('.sidebar').classList.toggle('open');
      });

      const list = CareerAid.qs("list");
      const msg = CareerAid.qs("msg");
      const q = CareerAid.qs("q");
      const emptyState = document.getElementById('emptyState');
      const loadMore = document.getElementById('loadMore');
      const loadMoreBtn = document.getElementById('loadMoreBtn');
      
      let allJobs = [];
      let currentIndex = 0;
      const jobsPerPage = 5;

      // 渲染岗位列表
      function renderJobs(startIndex, endIndex) {
        const jobsToShow = allJobs.slice(startIndex, endIndex);
        
        for (const j of jobsToShow) {
          const div = document.createElement("div");
          div.className = "item";
          const preview = j.match_preview || null;
          const score = preview ? Number(preview.score || 0) : null;
          const qualified = preview ? (preview.qualified !== false) : null;
          const coverage = preview && typeof preview.skill_coverage === "number" ? preview.skill_coverage : null;
          const reqCoverage =
            preview && typeof preview.required_skill_coverage === "number"
              ? preview.required_skill_coverage
              : null;
          div.innerHTML =
            '<div class="title">' +
            CareerAid.escapeHtml(j.title) +
            "</div>" +
            '<div class="meta">' +
            "<span class='badge'>" +
            CareerAid.escapeHtml(j.industry || "未知行业") +
            "</span>" +
            "<span class='badge'>" +
            CareerAid.escapeHtml(j.salary || "薪资未标注") +
            "</span>" +
            (preview
              ? "<span class='badge badge-accent'>匹配预览：<span class='score " +
                CareerAid.scoreClass(score) +
                "'>" +
                score +
                "%</span></span>" +
                (qualified === false
                  ? "<span class='badge badge-warn'>未达关键技能门槛" +
                    (coverage !== null && reqCoverage !== null
                      ? "（覆盖率 " + coverage + "% / 要求≥" + reqCoverage + "%）" 
                      : "") +
                    "</span>"
                  : "")
                : "<span class='badge'>匹配预览：登录并解析简历后可见</span>") +
            "</div>" +
            "<div style='margin-top:8px;color:var(--text-muted);font-size:13px;line-height:1.6'>" +
            CareerAid.escapeHtml((j.requirements_text || "").slice(0, 120)) +
            (j.requirements_text && j.requirements_text.length > 120 ? "..." : "") +
            "</div>" +
            "<div style='display:flex;gap:10px;flex-wrap:wrap;margin-top:12px'>" +
            "<a class='btn btn-sm' href='match.html'>查看匹配详情</a>" +
            "<a class='btn btn-sm' href='map.html?title=" +
            encodeURIComponent(j.title || "") +
            "'>在图谱中查看</a>" +
            "<a class='btn btn-sm primary' href='plan.html?job_id=" +
            j.id +
            "'>生成提升计划</a>" +
            "</div>";
          list.appendChild(div);


        }
        
        // 显示或隐藏查看更多按钮
        if (endIndex < allJobs.length) {
          loadMore.style.display = 'block';
        } else {
          loadMore.style.display = 'none';
        }
      }

      async function load() {
        msg.textContent = "加载中...";
        list.innerHTML = "";
        emptyState.style.display = 'none';
        loadMore.style.display = 'none';
        currentIndex = 0;
        
        const keyword = q.value.trim();
        const authed = Boolean(CareerAid.getToken());
        let url = "/jobs";
        const params = [];
        if (keyword) {
          params.push("q=" + encodeURIComponent(keyword));
        }
        if (authed) {
          params.push("include_match=1");
        }
        if (params.length > 0) {
          url += "?" + params.join("&");
        }
        try {
          const data = await CareerAid.apiFetch(url, { method: "GET" });
          allJobs = data.jobs || [];
          msg.textContent = "共 " + allJobs.length + " 个岗位";
          if (allJobs.length === 0) {
            emptyState.style.display = 'block';
            return;
          }
          
          // 初始显示前几个岗位
          renderJobs(0, jobsPerPage);
          currentIndex = jobsPerPage;
        } catch (e) {
          msg.textContent = "失败：" + (e.message || String(e));
          emptyState.style.display = 'block';
        }
      }
      
      // 加载更多岗位
      function loadMoreJobs() {
        renderJobs(currentIndex, currentIndex + jobsPerPage);
        currentIndex += jobsPerPage;
      }

      CareerAid.qs("search").addEventListener("click", load);
      CareerAid.qs("reset").addEventListener("click", () => {
        q.value = "";
        load();
      });
      
      // 查看更多按钮点击事件
      loadMoreBtn.addEventListener("click", loadMoreJobs);
      

      
      // 初始加载
      load();
    </script>

  </body>
</html>
