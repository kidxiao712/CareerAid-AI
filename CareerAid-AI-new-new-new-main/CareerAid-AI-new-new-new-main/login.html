<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 - CareerAid AI</title>
    <link rel="stylesheet" href="static/style.css" />
  </head>
  <body>
    <div class="login-layout">
      <div class="login-card">
        <div class="login-logo">
          <!-- 简约线条插画 -->
          <svg width="80" height="80" viewBox="0 0 80 80" class="illustration" style="margin-bottom:16px;opacity: 0.9;">
            <!-- 外框 -->
            <rect x="10" y="10" width="60" height="60" stroke="var(--primary)" stroke-width="3" fill="var(--primary-light)"/>
            <!-- 职业阶梯 -->
            <polyline points="20,55 30,55 30,45 40,45 40,35 50,35 50,25 60,25" 
                      stroke="#000" stroke-width="2" fill="none"/>
            <!-- 节点 -->
            <circle cx="20" cy="55" r="4" stroke="#000" stroke-width="2" fill="#fff"/>
            <circle cx="30" cy="45" r="4" stroke="#000" stroke-width="2" fill="#fff"/>
            <circle cx="40" cy="35" r="4" stroke="#000" stroke-width="2" fill="#fff"/>
            <circle cx="50" cy="25" r="4" stroke="#000" stroke-width="2" fill="var(--primary)"/>
            <!-- AI 星星 -->
            <polygon points="60,25 61,28 64,28 62,30 63,33 60,31 57,33 58,30 56,28 59,28" 
                     fill="var(--primary)" stroke="#000" stroke-width="1"/>
          </svg>
          <h1>CareerAid AI</h1>
          <p>大学生职业规划智能体</p>
        </div>
        
        <form id="loginForm">
          <div class="form-group">
            <label>用户名</label>
            <input id="username" placeholder="admin" autocomplete="username" required />
          </div>
          
          <div class="form-group">
            <label>密码</label>
            <input id="password" type="password" placeholder="123456" autocomplete="current-password" required />
          </div>
          
          <button class="btn btn-primary btn-lg" type="submit" style="width:100%;margin-top:8px">
            登录
          </button>
          
          <div class="form-hint" style="text-align:center;margin-top:16px">
            测试账号：<span class="mono">admin</span> / <span class="mono">123456</span>
          </div>
          
          <div class="form-hint" style="text-align:center;margin-top:8px">
            还没有账号？<a href="register.html">立即注册</a>
          </div>
          
          <div id="msg" class="form-hint" style="color:#dc2626;text-align:center;margin-top:12px"></div>
        </form>
        
        <div class="divider"></div>
        
        <div style="font-size:13px;color:var(--text-muted);line-height:1.6">
          <p style="margin-bottom:12px"><strong>登录说明</strong></p>
          <p>当前为演示版登录：后端会返回一个临时 Token（保存在浏览器本地），用于调用简历解析、测评提交、人岗匹配与报告生成接口。</p>
          <p style="margin-top:12px;font-size:12px">企业接入时可替换为：校园统一认证/短信验证码/SSO，并将 Token 改为 JWT 或服务端 Session。</p>
        </div>
        
      </div>
    </div>

    <script src="static/app.js"></script>
    <script>
      const msg = CareerAid.qs("msg");
      const username = CareerAid.qs("username");
      const password = CareerAid.qs("password");
      username.value = "admin";
      password.value = "123456";

      CareerAid.qs("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.textContent = "";
        try {
          const data = await CareerAid.apiFetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: username.value.trim(), password: password.value.trim() }),
          });
          CareerAid.setToken(data.token);
          window.location.href = "chat.html";
        } catch (err) {
          msg.textContent = err.message || String(err);
        }
      });
    </script>
  </body>
</html>
