<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>人岗匹配 - CareerAid AI</title>
    <link rel="stylesheet" href="static/style.css" />
    <script src="static/echarts.min.js"></script>
  </head>
  <body>
    <div class="app-layout">
      <!-- 侧边栏 -->
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="logo">CareerAid AI</div>
          <div class="tagline">大学生职业规划智能体</div>
        </div>
        
        <nav class="sidebar-nav">
          <div class="nav-section">
            <div class="nav-section-title">核心功能</div>
            <a class="nav-item" href="upload.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
              简历解析
            </a>
            <a class="nav-item" href="test.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              性格测评
            </a>
            <a class="nav-item active" href="match.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              人岗匹配
            </a>
            <a class="nav-item" href="report.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              报告生成
            </a>
          </div>
          
          <div class="nav-section">
            <div class="nav-section-title">更多</div>
            <a class="nav-item" href="chat.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
              AI对话
            </a>
            <a class="nav-item" href="job.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              提升规划
            </a>
            <a class="nav-item" href="admin.html" id="adminLink" style="display: none;">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              管理员后台
            </a>
          </div>
        </nav>
        
        <div class="sidebar-footer">
          <div class="user-info" id="userInfo">
            <div class="user-avatar">U</div>
            <div class="user-meta">
              <div class="user-name" id="userName">用户</div>
              <div class="user-role">学生</div>
            </div>
          </div>
          <button class="btn btn-danger" style="width:100%;margin-top:12px" id="logoutBtn">退出登录</button>
        </div>
      </aside>

      <!-- 主内容区 -->
      <main class="main-content">
        <header class="topbar">
          <button class="menu-toggle" id="menuToggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="topbar-title">人岗匹配</h1>
          <div class="topbar-actions">
            <span class="badge badge-secondary">TOP5 岗位推荐</span>
            <span class="badge badge-primary">双线匹配</span>
          </div>
        </header>

        <div class="page-content">
          <!-- 非对称布局 -->
          <div class="asymmetric-grid">
            <!-- 左侧：岗位列表 -->
            <div class="card card-featured">
              <div class="card-header">
                <div>
                  <h2 class="card-title">TOP5 推荐岗位</h2>
                  <p class="card-subtitle">基于简历和测评的智能匹配</p>
                </div>
                <!-- 独特插画 - 人岗匹配 -->
                <svg width="80" height="80" viewBox="0 0 80 80" class="illustration" style="opacity: 0.9;">
                  <!-- 倒过来的半圆形身体 -->
                  <path d="M15 50 a10 15 0 0 1 20 0" fill="var(--primary)" stroke="#000" stroke-width="2"/>
                  <!-- 人物图标 -->
                  <circle cx="25" cy="30" r="10" fill="var(--primary-light)" stroke="var(--primary)" stroke-width="2"/>
                  <!-- 连接箭头 -->
                  <line x1="35" y1="40" x2="55" y2="40" stroke="#000" stroke-width="2"/>
                  <polygon points="55,37 63,40 55,43" fill="var(--primary)" stroke="#000" stroke-width="1"/>
                  <!-- 岗位图标 -->
                  <rect x="60" y="32" width="12" height="20" fill="var(--primary)" stroke="#000" stroke-width="2"/>
                  <rect x="58" y="25" width="16" height="6" fill="var(--primary)" stroke="#000" stroke-width="2"/>
                </svg>
              </div>
              
              <div class="form-group">
                <label>你的目标（可选）</label>
                <input id="goal" placeholder="例如：想走数据分析方向，优先互联网/新能源" />
              </div>
              
              <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">
                <button class="btn btn-primary" id="run">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                  开始匹配
                </button>
                <a class="btn" href="upload.html">先去解析简历</a>
              </div>
              
              <div class="form-hint" id="msg"></div>
              
              <div class="hr"></div>
              <div class="list" id="list"></div>
              
              <div class="card card-accent" style="margin-top:20px">
                <div style="font-weight:700;margin-bottom:8px">匹配算法说明</div>
                <div style="font-size:13px;color:var(--text-muted)">
                  <p>• <strong>离线算法</strong>：基于规则和机器学习的匹配算法，速度快，稳定性高</p>
                  <p>• <strong>在线大模型</strong>：使用AI大模型进行深度语义理解，匹配更智能</p>
                  <p>• <strong>双线匹配</strong>：同时展示两种匹配结果，便于对比参考</p>
                </div>
              </div>
            </div>

            <!-- 右侧：雷达图 -->
            <div class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title">维度匹配雷达图</h2>
                  <p class="card-subtitle">多维度能力分析</p>
                </div>
              </div>
              
              <div class="form-hint">默认展示 TOP1 的维度匹配度（0-100）。</div>
              <div class="hr"></div>
              
              <!-- 空状态 - 独特插画 -->
              <div id="emptyState" style="text-align:center;padding:40px 20px">
                <svg width="180" height="160" viewBox="0 0 180 160" class="illustration" style="margin-bottom:16px;opacity: 0.9;">
                  <!-- 正四边形雷达图背景 -->
                  <polygon points="90,20 150,80 90,140 30,80" stroke="var(--primary)" stroke-width="2" fill="var(--primary-light)" fill-opacity="0.5"/>
                  <!-- 内层四边形 -->
                  <polygon points="90,40 130,80 90,120 50,80" stroke="#000" stroke-width="1" fill="var(--primary)" fill-opacity="0.2"/>
                  <!-- 雷达轴线 -->
                  <line x1="90" y1="20" x2="90" y2="140" stroke="#000" stroke-width="1" stroke-dasharray="4,2"/>
                  <line x1="30" y1="80" x2="150" y2="80" stroke="#000" stroke-width="1" stroke-dasharray="4,2"/>
                  <line x1="30" y1="80" x2="150" y2="80" stroke="#000" stroke-width="1" stroke-dasharray="4,2"/>
                  <line x1="90" y1="20" x2="150" y2="80" stroke="#000" stroke-width="1" stroke-dasharray="4,2"/>
                  <line x1="150" y1="80" x2="90" y2="140" stroke="#000" stroke-width="1" stroke-dasharray="4,2"/>
                  <line x1="90" y1="140" x2="30" y2="80" stroke="#000" stroke-width="1" stroke-dasharray="4,2"/>
                  <line x1="30" y1="80" x2="90" y2="20" stroke="#000" stroke-width="1" stroke-dasharray="4,2"/>
                  <!-- 维度标签点 -->
                  <circle cx="90" cy="20" r="4" fill="var(--primary)" stroke="#000" stroke-width="1"/>
                  <circle cx="150" cy="80" r="4" fill="var(--primary)" stroke="#000" stroke-width="1"/>
                  <circle cx="90" cy="140" r="4" fill="var(--primary)" stroke="#000" stroke-width="1"/>
                  <circle cx="30" cy="80" r="4" fill="var(--primary)" stroke="#000" stroke-width="1"/>
                  <!-- 中心点 -->
                  <circle cx="90" cy="80" r="4" fill="#000"/>
                </svg>
                <div style="color:var(--text-muted);font-size:14px;font-weight:600">开始匹配后将显示雷达图</div>
                <div style="color:var(--text-muted);font-size:12px;margin-top:8px">多维度能力分析 · 智能推荐</div>
              </div>
              
              <div id="radar" style="height:360px;display:none"></div>
              
              <div class="hr"></div>
              
              <!-- 卡片内容已移至 analysis.html 页面 -->
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="static/app.js"></script>
    <script>
      if (!CareerAid.requireAuth()) throw new Error("not authed");
      
      // 加载用户信息
      CareerAid.apiFetch('/me').then(data => {
        const s = data.student || {};
        document.getElementById('userName').textContent = s.username || '用户';
        document.querySelector('.user-avatar').textContent = (s.username || 'U')[0].toUpperCase();
        
        // 显示管理员后台链接
        if (s.username === 'admin') {
          document.getElementById('adminLink').style.display = 'block';
        }
      }).catch(() => {});
      
      // 退出登录
      document.getElementById('logoutBtn').addEventListener('click', () => {
        CareerAid.clearToken();
        window.location.href = 'index.html';
      });
      
      // 移动端菜单
      document.getElementById('menuToggle').addEventListener('click', () => {
        document.querySelector('.sidebar').classList.toggle('open');
      });

      const listEl = CareerAid.qs("list");
      const msgEl = CareerAid.qs("msg");
      const radarDom = document.getElementById("radar");
      const emptyState = document.getElementById("emptyState");
      let radar = null;

      const DIM4 = ["基础要求", "职业技能", "职业素养", "发展潜力"];
      const DIM10 = ["专业技能", "证书要求", "创新能力", "学习能力", "抗压能力", "沟通能力", "实习能力", "团队协作", "问题解决", "职业稳定性"];

      function initRadar() {
        if (!radar) {
          radar = echarts.init(radarDom);
        }
      }

      function renderRadar(dim, dim4) {
        emptyState.style.display = 'none';
        radarDom.style.display = 'block';
        initRadar();
        
        const use4 = dim4 && Object.keys(dim4).length >= 2;
        const keys = use4 ? DIM4 : (dim && Object.keys(dim).length >= 5 ? DIM10.slice(0, 6) : DIM4);
        const vals = use4
          ? DIM4.map((k) => Number(dim4[k] != null ? dim4[k] : 50))
          : keys.map((k) => Number(dim && dim[k] != null ? dim[k] : 50));
        
        radar.setOption({
          backgroundColor: "transparent",
          tooltip: {},
          radar: {
            indicator: keys.map((k) => ({ name: k, max: 100 })),
            splitArea: { areaStyle: { color: ["#f5f7fa", "#ffffff"] } },
            axisName: { color: "#000", fontWeight: "bold" },
            splitLine: { lineStyle: { color: "#000", width: 1 } },
            axisLine: { lineStyle: { color: "#000", width: 2 } },
          },
          series: [
            {
              type: "radar",
              data: [
                {
                  value: vals,
                  name: "匹配度",
                  areaStyle: { color: "rgba(37,99,235,0.3)" },
                  lineStyle: { color: "#2563eb", width: 3 },
                  itemStyle: { color: "#2563eb", borderWidth: 2, borderColor: "#000" },
                },
              ],
            },
          ],
        });
      }

      function renderList(matches) {
        listEl.innerHTML = "";
        matches.slice(0, 5).forEach((m, idx) => {
          const div = document.createElement("div");
          div.className = "item";
          const d4 = m.dimension_scores_4 || {};
          const d4Text = Object.keys(d4).length ? (" 四维：" + DIM4.map((k) => k + " " + (d4[k] || 0) + "%").join(" ")) : "";
          
          // 检查是否有在线和离线匹配结果
          const hasOnline = m.online_result && m.online_result.score;
          const hasOffline = m.offline_result && m.offline_result.score;
          
          div.innerHTML =
            '<div class="title">' +
            (idx + 1) +
            ". " +
            CareerAid.escapeHtml(m.job_title) +
            " <span class='score " +
            CareerAid.scoreClass(m.score) +
            "'>" +
            m.score +
            "%</span></div>" +
            '<div class="meta">' +
            "<span class='badge'>" +
            CareerAid.escapeHtml(m.industry || "未知行业") +
            "</span>" +
            "<span class='badge'>" +
            CareerAid.escapeHtml(m.salary || "薪资未标注") +
            "</span>" +
            (d4Text ? "<span class='badge badge-accent'>" + CareerAid.escapeHtml(d4Text.trim()) + "</span>" : "") +
            (hasOnline ? "<span class='badge badge-primary'>在线匹配：" + m.online_result.score + "%</span>" : "") +
            (hasOffline ? "<span class='badge badge-success'>离线匹配：" + m.offline_result.score + "%</span>" : "") +
            "</div>" +
            "<div style='display:flex;gap:10px;flex-wrap:wrap;margin-top:10px'>" +
            "<button class='btn btn-sm' data-idx='" +
            idx +
            "'>查看维度差距及双线对比</button>" +
            "</div>";
          
          // 查看维度差距及双线对比按钮
          div.querySelector("button").addEventListener("click", () => {
            // 将匹配数据存储到 localStorage 中
            localStorage.setItem('matchData', JSON.stringify(m));
            window.location.href = `analysis.html`;
          });
          
          listEl.appendChild(div);
        });
      }

      async function run() {
        msgEl.textContent = "匹配中...";
        try {
          const goal = CareerAid.qs("goal").value.trim();
          const data = await CareerAid.apiFetch("/match_jobs", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ goal }),
          });
          const matches = data.matches || [];
          msgEl.textContent = "完成。";
          renderList(matches);
          if (matches[0]) {
            renderRadar(matches[0].dimension_scores || {}, matches[0].dimension_scores_4 || {});
          } else {
            if (radar) radar.clear();
            radarDom.style.display = 'none';
            emptyState.style.display = 'block';
          }
        } catch (e) {
          msgEl.textContent = "失败：" + (e.message || String(e));
          if (radar) radar.clear();
          radarDom.style.display = 'none';
          emptyState.style.display = 'block';
        }
      }

      CareerAid.qs("run").addEventListener("click", run);
      
      function renderDualMatch(match) {
        const dualMatchEl = document.getElementById('dualMatch');
        
        const onlineResult = match.online_result;
        const offlineResult = match.offline_result;
        
        let html = '';
        
        // 在线大模型结果
        if (onlineResult) {
          html += `
            <div style="margin-bottom:20px;padding:15px;border-left:4px solid #3498db;background-color:#f8f9fa;border-radius:4px">
              <h4 style="margin-top:0;color:#2980b9">在线大模型匹配</h4>
              <div style="font-size:24px;font-weight:bold;margin:10px 0">${onlineResult.score}%</div>
              <div style="font-size:14px;color:#666;margin:10px 0">${onlineResult.reasoning || '无推理过程'}</div>
              ${onlineResult.dimension_scores_4 ? `
                <div style="margin-top:15px">
                  <h5 style="margin:0 0 10px 0;font-size:14px;color:#555">维度得分</h5>
                  <div style="display:flex;flex-wrap:wrap;gap:10px">
                    ${DIM4.map(dim => `
                      <span class="badge">${dim}: ${onlineResult.dimension_scores_4[dim] || 0}%</span>
                    `).join('')}
                  </div>
                </div>
              ` : ''}
            </div>
          `;
        } else {
          html += `
            <div style="margin-bottom:20px;padding:15px;border-left:4px solid #95a5a6;background-color:#f8f9fa;border-radius:4px">
              <h4 style="margin-top:0;color:#7f8c8d">在线大模型匹配</h4>
              <div style="color:#999;font-style:italic;padding:20px 0">在线匹配失败，已使用离线匹配结果</div>
            </div>
          `;
        }
        
        // 离线算法结果
        if (offlineResult) {
          html += `
            <div style="padding:15px;border-left:4px solid #27ae60;background-color:#f8f9fa;border-radius:4px">
              <h4 style="margin-top:0;color:#229954">离线算法匹配</h4>
              <div style="font-size:24px;font-weight:bold;margin:10px 0">${offlineResult.score}%</div>
              <div style="font-size:14px;color:#666;margin:10px 0">${offlineResult.reasoning || '无推理过程'}</div>
              ${offlineResult.dimension_scores_4 ? `
                <div style="margin-top:15px">
                  <h5 style="margin:0 0 10px 0;font-size:14px;color:#555">维度得分</h5>
                  <div style="display:flex;flex-wrap:wrap;gap:10px">
                    ${DIM4.map(dim => `
                      <span class="badge">${dim}: ${offlineResult.dimension_scores_4[dim] || 0}%</span>
                    `).join('')}
                  </div>
                </div>
              ` : ''}
              ${offlineResult.ml_enhanced ? `
                <div style="margin-top:10px;font-size:12px;color:#27ae60">
                  ✅ 使用了机器学习增强匹配
                </div>
              ` : ''}
            </div>
          `;
        }
        
        dualMatchEl.innerHTML = html;
      }
      
      // 窗口大小改变时重新渲染图表
      window.addEventListener('resize', () => {
        if (radar) radar.resize();
      });
    </script>
  </body>
</html>
