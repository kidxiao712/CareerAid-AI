<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>报告生成 - CareerAid AI</title>
    <link rel="stylesheet" href="static/style.css" />
  </head>
  <body>
    <div class="app-layout">
      <!-- 侧边栏 -->
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="logo">CareerAid AI</div>
          <div class="tagline">大学生职业规划智能体</div>
        </div>
        
        <nav class="sidebar-nav">
          <div class="nav-section">
            <div class="nav-section-title">核心功能</div>
            <a class="nav-item" href="upload.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
              简历解析
            </a>
            <a class="nav-item" href="test.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              性格测评
            </a>
            <a class="nav-item" href="match.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              人岗匹配
            </a>
            <a class="nav-item active" href="report.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              报告生成
            </a>
          </div>
          
          <div class="nav-section">
            <div class="nav-section-title">更多</div>
            <a class="nav-item" href="chat.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
              AI对话
            </a>
            <a class="nav-item" href="job.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
              岗位列表
            </a>
          </div>
        </nav>
        
        <div class="sidebar-footer">
          <div class="user-info" id="userInfo">
            <div class="user-avatar">U</div>
            <div class="user-meta">
              <div class="user-name" id="userName">用户</div>
              <div class="user-role">学生</div>
            </div>
          </div>
          <button class="btn btn-danger" style="width:100%;margin-top:12px" id="logoutBtn">退出登录</button>
        </div>
      </aside>

      <!-- 主内容区 -->
      <main class="main-content">
        <header class="topbar">
          <button class="menu-toggle" id="menuToggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="topbar-title">报告生成</h1>
          <div class="topbar-actions">
            <span class="badge badge-secondary">一键生成</span>
          </div>
        </header>

        <div class="page-content">
          <!-- 非对称布局 -->
          <div class="asymmetric-grid">
            <!-- 左侧：生成设置 -->
            <div class="card card-featured">
              <div class="card-header">
                <div>
                  <h2 class="card-title">生成设置</h2>
                  <p class="card-subtitle">个性化职业规划报告</p>
                </div>
                <!-- 简约线条插画 -->
                <svg width="60" height="60" viewBox="0 0 60 60" class="illustration" style="opacity: 0.9;">
                  <rect x="10" y="8" width="40" height="44" stroke="var(--primary)" stroke-width="2" fill="var(--primary-light)"/>
                  <line x1="18" y1="20" x2="42" y2="20" stroke="#000" stroke-width="2"/>
                  <line x1="18" y1="28" x2="42" y2="28" stroke="#000" stroke-width="2"/>
                  <line x1="18" y1="36" x2="38" y2="36" stroke="#000" stroke-width="2"/>
                  <polygon points="45,52 50,42 40,42" fill="var(--primary)" stroke="#000" stroke-width="1"/>
                </svg>
              </div>
              
              <div class="form-group">
                <label>你的目标（可选）</label>
                <input id="goal" placeholder="例如：希望进入互联网数据分析，偏北京/上海" />
              </div>
              
              <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">
                <button class="btn btn-primary" id="gen">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                  一键生成报告
                </button>
                <a class="btn" href="match.html">先看匹配结果</a>
              </div>
              
              <div class="form-hint" id="msg"></div>
              
              <div id="downloadWrap" style="display:none;margin-top:20px">
                <div class="hr"></div>
                <div style="font-weight:700;margin-bottom:12px">下载报告</div>
                <div style="display:flex;gap:12px;flex-wrap:wrap">
                  <a class="btn btn-primary" id="download" href="#" target="_blank" rel="noreferrer">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    下载 TXT
                  </a>
                  <a class="btn" id="downloadDocx" href="#" target="_blank" rel="noreferrer">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    下载 Word
                  </a>
                </div>
              </div>
            </div>

            <!-- 右侧：报告内容 -->
            <div class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title">报告内容</h2>
                  <p class="card-subtitle">AI 生成的职业规划报告</p>
                </div>
              </div>
              
              <div class="form-hint">生成后会保存到数据库；支持内容完整性检查、手动编辑后复制导出。</div>
              <div id="completeness" class="form-hint" style="margin-top:6px"></div>
              <div class="hr"></div>
              
              <!-- 空状态 -->
              <div id="emptyState" style="text-align:center;padding:60px 20px">
                <svg width="140" height="120" viewBox="0 0 140 120" class="illustration" style="margin-bottom:16px;opacity: 0.9;">
                  <!-- 报告文档 -->
                  <rect x="30" y="10" width="80" height="100" stroke="var(--primary)" stroke-width="2" fill="var(--primary-light)"/>
                  <line x1="45" y1="30" x2="95" y2="30" stroke="#000" stroke-width="2"/>
                  <line x1="45" y1="45" x2="95" y2="45" stroke="#000" stroke-width="2"/>
                  <line x1="45" y1="60" x2="95" y2="60" stroke="#000" stroke-width="2"/>
                  <line x1="45" y1="75" x2="80" y2="75" stroke="#000" stroke-width="2"/>
                  <!-- 印章/徽章 -->
                  <circle cx="100" cy="85" r="15" stroke="#000" stroke-width="2" fill="#fff"/>
                  <line x1="92" y1="85" x2="108" y2="85" stroke="var(--primary)" stroke-width="2"/>
                  <line x1="100" y1="77" x2="100" y2="93" stroke="var(--primary)" stroke-width="2"/>
                </svg>
                <div style="color:var(--text-muted);font-size:14px">点击"一键生成报告"开始生成</div>
              </div>
              
              <pre class="mono" id="out" style="white-space:pre-wrap;word-break:break-word;margin:0;min-height:200px;display:none;font-size:14px;line-height:1.7"></pre>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="static/app.js"></script>
    <script>
      if (!CareerAid.requireAuth()) throw new Error("not authed");
      
      // 加载用户信息
      CareerAid.apiFetch('/me').then(data => {
        const s = data.student || {};
        document.getElementById('userName').textContent = s.username || '用户';
        document.querySelector('.user-avatar').textContent = (s.username || 'U')[0].toUpperCase();
      }).catch(() => {});
      
      // 退出登录
      document.getElementById('logoutBtn').addEventListener('click', () => {
        CareerAid.clearToken();
        window.location.href = 'index.html';
      });
      
      // 移动端菜单
      document.getElementById('menuToggle').addEventListener('click', () => {
        document.querySelector('.sidebar').classList.toggle('open');
      });

      const msg = CareerAid.qs("msg");
      const out = CareerAid.qs("out");
      const downloadWrap = document.getElementById("downloadWrap");
      const download = document.getElementById("download");
      const downloadDocx = document.getElementById("downloadDocx");
      const completenessEl = document.getElementById("completeness");
      const emptyState = document.getElementById("emptyState");

      document.getElementById("gen").addEventListener("click", async () => {
        msg.textContent = "生成中...";
        out.textContent = "";
        out.style.display = 'none';
        emptyState.style.display = 'block';
        downloadWrap.style.display = "none";
        completenessEl.textContent = "";
        try {
          const goal = CareerAid.qs("goal").value.trim();
          const data = await CareerAid.apiFetch("/generate_report", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ goal }),
          });
          msg.textContent = "已生成。";
          emptyState.style.display = 'none';
          out.style.display = 'block';
          out.textContent = data.content || "";
          if (data.download_url) {
            download.href = data.download_url;
            downloadWrap.style.display = "block";
          }
          if (data.download_docx_url) {
            downloadDocx.href = data.download_docx_url;
            downloadWrap.style.display = "block";
          }
          const check = data.completeness_check || {};
          if (check.complete) {
            completenessEl.textContent = "完整性检查：通过。";
            completenessEl.style.color = "#2563eb";
          } else if (check.missing_sections && check.missing_sections.length) {
            completenessEl.textContent = "完整性检查：缺失 " + check.missing_sections.join("、") + "。建议补充后重新生成。";
            completenessEl.style.color = "#f59e0b";
          }
        } catch (e) {
          msg.textContent = "失败：" + (e.message || String(e));
        }
      });
    </script>
  </body>
</html>
