<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI对话 - CareerAid AI</title>
    <link rel="stylesheet" href="static/style.css" />
  </head>
  <body>
    <div class="app-layout">
      <!-- 侧边栏 -->
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="logo">CareerAid AI</div>
          <div class="tagline">大学生职业规划智能体</div>
        </div>
        
        <nav class="sidebar-nav">
          <div class="nav-section">
            <div class="nav-section-title">核心功能</div>
            <a class="nav-item" href="upload.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
              简历解析
            </a>
            <a class="nav-item" href="test.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              性格测评
            </a>
            <a class="nav-item" href="match.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              人岗匹配
            </a>
            <a class="nav-item" href="report.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              报告生成
            </a>
          </div>
          
          <div class="nav-section">
            <div class="nav-section-title">更多</div>
            <a class="nav-item active" href="chat.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
              AI对话
            </a>
            <a class="nav-item" href="job.html">
              <svg class="nav-icon" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
              岗位列表
            </a>
          </div>
        </nav>
        
        <div class="sidebar-footer">
          <div class="user-info" id="userInfo">
            <div class="user-avatar">U</div>
            <div class="user-meta">
              <div class="user-name" id="userName">用户</div>
              <div class="user-role">学生</div>
            </div>
          </div>
          <button class="btn btn-danger" style="width:100%;margin-top:12px" id="logoutBtn">退出登录</button>
        </div>
      </aside>

      <!-- 主内容区 -->
      <main class="main-content">
        <header class="topbar">
          <button class="menu-toggle" id="menuToggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="topbar-title">AI对话</h1>
          <div class="topbar-actions">
            <span class="badge badge-secondary" id="status">加载中...</span>
          </div>
        </header>

        <div class="page-content">
          <!-- 单栏布局 -->
          <div class="asymmetric-grid single">
            <div class="card" style="padding:0;overflow:hidden">
              <div class="card-header" style="margin:0;padding:20px 24px;border-bottom:var(--border-width) solid var(--border)">
                <div>
                  <h2 class="card-title">职业规划助手</h2>
                  <p class="card-subtitle">基于你的简历和测评结果提供建议</p>
                </div>
                <!-- 简约线条插画 -->
                <svg width="50" height="50" viewBox="0 0 60 60" class="illustration" style="opacity: 0.9;">
                  <rect x="15" y="25" width="30" height="20" stroke="var(--primary)" stroke-width="2" fill="var(--primary-light)"/>
                  <circle cx="30" cy="18" r="8" stroke="#000" stroke-width="2" fill="#fff"/>
                  <line x1="22" y1="35" x2="38" y2="35" stroke="#000" stroke-width="2"/>
                </svg>
              </div>
              
              <!-- 聊天区域 -->
              <div class="chat-messages" id="chat" style="height:500px;background:var(--bg)"></div>
              
              <!-- 输入区域 -->
              <div class="chat-input-area" style="border-top:var(--border-width) solid var(--border);margin:0">
                <input class="chat-input" id="input" placeholder="输入消息，回车发送...例如：请结合我的简历和测评，分析我适合的岗位" />
                <button class="btn btn-primary" id="send" style="box-shadow:none">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="static/app.js"></script>
    <script>
      if (!CareerAid.requireAuth()) throw new Error("not authed");
      
      // 加载用户信息
      CareerAid.apiFetch('/me').then(data => {
        const s = data.student || {};
        document.getElementById('userName').textContent = s.username || '用户';
        document.querySelector('.user-avatar').textContent = (s.username || 'U')[0].toUpperCase();
        document.getElementById('status').textContent = `当前账号：${s.username || ''}`;
      }).catch((e) => {
        document.getElementById('status').textContent = e.message || '加载失败';
      });
      
      // 退出登录
      document.getElementById('logoutBtn').addEventListener('click', () => {
        CareerAid.clearToken();
        window.location.href = 'index.html';
      });
      
      // 移动端菜单
      document.getElementById('menuToggle').addEventListener('click', () => {
        document.querySelector('.sidebar').classList.toggle('open');
      });

      const chatEl = CareerAid.qs("chat");
      const inputEl = CareerAid.qs("input");

      function addBubble(role, text) {
        const div = document.createElement("div");
        div.className = "chat-bubble " + (role === "user" ? "user" : "ai");
        div.innerHTML =
          '<div class="chat-avatar">' +
          (role === "user" ? "我" : "AI") +
          '</div>' +
          '<div class="chat-content">' +
          '<div class="chat-author">' +
          (role === "user" ? "你" : "AI助手") +
          '</div><div class="chat-text">' +
          CareerAid.escapeHtml(text) +
          "</div></div>";
        chatEl.appendChild(div);
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      async function loadHistory() {
        try {
          const data = await CareerAid.apiFetch("/chat/history?limit=200");
          chatEl.innerHTML = "";
          const msgs = data.messages || [];
          if (!msgs.length) {
            addBubble("ai", "你好！我是你的 AI 职业规划助手，先点击侧边栏【简历解析】上传简历，我来为你解析个人能力画像吧～");
            return;
          }
          for (const m of msgs) {
            if (m.role === "user") addBubble("user", m.content);
            else if (m.role === "ai") addBubble("ai", m.content);
          }
        } catch (e) {
          addBubble("ai", "加载历史记录失败：" + (e.message || String(e)));
        }
      }

      async function send() {
        const text = inputEl.value.trim();
        if (!text) return;
        inputEl.value = "";
        addBubble("user", text);
        try {
          const res = await CareerAid.apiFetch("/chat/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text }),
          });
          addBubble("ai", res.reply || "（无回复）");
        } catch (e) {
          addBubble("ai", "发送失败：" + (e.message || String(e)));
        }
      }

      CareerAid.qs("send").addEventListener("click", send);
      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          send();
        }
      });

      loadHistory();
    </script>
  </body>
</html>
